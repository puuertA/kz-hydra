<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="view-transition" content="same-origin" />
  <title>KZ Hydra | Perfil do Mapa</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="map-profile">
  <header><div class="container nav"><div class="brand"></div><nav class="nav-links"><a data-page="home" href="index.html">Home</a><a data-page="leaderboards" href="leaderboards.html">Leaderboards</a><a data-page="players" href="players.html">Perfis</a><a data-page="maps" href="maps.html">Mapas</a><a data-page="activity" href="activity.html">Atividade</a><a data-page="rules" href="rules.html">Regras/Bans</a><a data-page="guide" href="guide.html">Guia</a><a data-page="contact" href="contact.html">Contato</a></nav></div></header>

  <main class="container">
    <section class="hero">
      <h1 id="map-profile-title">Perfil do mapa</h1>
      <p>Detalhes completos do mapa, status e melhores records.</p>
    </section>

    <section class="grid">
      <article class="card row-8">
        <h3>Resumo do mapa</h3>
        <div id="map-profile-summary" class="notice">Carregando informações do mapa...</div>
      </article>

      <article class="card row-4">
        <h3>Conclusões por modo</h3>
        <div id="map-profile-stats" class="notice">Carregando estatísticas...</div>
      </article>

      <article class="card">
        <div class="filters">
          <div>
            <label for="map-profile-mode">Modo</label>
            <select id="map-profile-mode">
              <option value="kz_timer">KZ Timer (KZT)</option>
              <option value="kz_simple">Simple KZ (SKZ)</option>
              <option value="kz_vanilla">Vanilla (VNL)</option>
            </select>
          </div>
          <div>
            <label for="map-profile-scope">Escopo</label>
            <select id="map-profile-scope">
              <option value="global">Global</option>
              <option value="hydra">Hydra</option>
            </select>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Jogador</th>
                <th>Tempo</th>
                <th>TP</th>
                <th>Pontos</th>
              </tr>
            </thead>
            <tbody id="map-profile-records-body"></tbody>
          </table>
        </div>
      </article>

      <article class="card" id="map-profile-fallback"></article>
    </section>
  </main>

  <footer><div class="container">© <span id="year"></span> KZ Hydra</div></footer>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
  <script src="assets/js/api.js?v=4"></script>
  <script src="assets/js/main.js?v=19"></script>
  <script type="module" src="assets/js/ux.js?v=4"></script>
</body>
</html>
